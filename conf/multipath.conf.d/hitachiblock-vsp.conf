# Recommended multipath configuration for Hitachi VSP storage
# Copy to /etc/multipath/conf.d/hitachiblock-vsp.conf

devices {
    device {
        vendor                  "HITACHI"
        # OPEN-.* (not OPEN-V) so this stanza ALSO claims Thin Image virtual volumes,
        # which present as product "OPEN-0V" — linked-clone S-VOLs are TI v-vols, so a
        # bare "OPEN-V" match leaves them unmanaged and /dev/mapper/3<naa> never appears
        # (activate_volume then hangs). Verified live on the E590H; matches Red Hat KB
        # 2598221 (HITACHI OPEN-V and OPEN-0V dm-multipath configuration).
        product                 "OPEN-.*"
        path_grouping_policy    group_by_prio
        path_selector           "round-robin 0"
        prio                    alua
        failback                immediate
        no_path_retry           6
        rr_min_io_rq            1
        detect_prio             yes
        fast_io_fail_tmo        5
        dev_loss_tmo            30
    }
}
