# Recommended multipath configuration for Hitachi VSP storage.
# Copy to /etc/multipath/conf.d/hitachiblock-vsp.conf then `multipathd reconfigure`.
#
# Values reconciled against the authoritative baselines: the multipath-tools built-in
# HITACHI "^OPEN-" hardware-table entry (libmultipath/hwtable.c) and Hitachi Vantara's
# "Configuring Device Mapper Multipath on Red Hat and SUSE Linux with VSP One Block 20"
# guide (2024). On modern multipath-tools (>=0.9) the built-in entry already claims
# OPEN-* with group_by_prio + failback immediate; this stanza is an explicit,
# version-independent override that documents the intended tuning.
#
# DO NOT add a defaults{} block here and DO NOT enable user_friendly_names: this plugin
# resolves each LUN by its WWID path /dev/mapper/3<naa>, so friendly mpathN names would
# break activate_volume. DO NOT set reservation_key / all_tg_pt: SCSI-3 persistent
# reservations are managed per-VM by qemu-pr-helper, and a multipathd-owned key would
# conflict with it. PVE's own /etc/multipath.conf governs the global defaults
# (find_multipaths strict) — leave those in place.

devices {
    device {
        vendor                  "HITACHI"
        # OPEN-.* (not bare OPEN-V) so this stanza ALSO claims Thin Image virtual
        # volumes, which present as product "OPEN-0V" — linked-clone S-VOLs are TI
        # v-vols, so a bare "OPEN-V" match leaves them unmanaged and /dev/mapper/3<naa>
        # never appears (activate_volume then hangs). Equivalent to the built-in
        # "^OPEN-" entry; matches Red Hat KB 2598221. Verified live on the E590H.
        product                 "OPEN-.*"
        # ALUA is enabled on the array (isAluaEnabled); group_by_prio + prio alua is
        # the built-in/vendor choice and correctly deprioritises any non-optimised
        # (e.g. future GAD/HUR cross-site) paths. detect_prio also auto-selects alua.
        path_grouping_policy    group_by_prio
        prio                    alua
        detect_prio             yes
        # service-time (queue-aware) is the modern default and preferred on all-flash
        # VSP E-series over the legacy round-robin selector.
        path_selector           "service-time 0"
        failback                immediate
        # Finite (never "queue") so I/O errors surface and PVE-HA can fence/recover;
        # 10 matches the built-in HITACHI hwtable entry and Hitachi's VSP guide.
        no_path_retry           10
        # FC timeouts: fast_io_fail_tmo 5 is the default; dev_loss_tmo 30 (vs the 600
        # default) releases the SCSI device faster on port loss — a deliberate
        # cluster/HA tuning, not a Hitachi-mandated value.
        fast_io_fail_tmo        5
        dev_loss_tmo            30
    }
}
